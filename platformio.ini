; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:m5stack-core2]
platform = espressif32
board = m5stack-core2
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
lib_deps = 
	m5stack/M5Unified@0.2.5
	lvgl/lvgl@^9.5.0
	bblanchon/ArduinoJson@^7.4.2
	ayushsharma82/ElegantOTA@^3.1.7
build_flags = 
	-I include
	-I ${PROJECT_DIR}/.pio/libdeps/${PIOENV}/lvgl/src
extra_scripts = 
	pre:filter_m5gfx.py

; Select this environment in PlatformIO, set upload_port to the device’s LAN IP (or m5-kiln.local)
; and use Build / Upload: firmware is sent with PlatformIO’s espota tool (ArduinoOTA, port 3232).
; Device must be on Wi-Fi; USB is not used for the upload.
[env:m5stack-core2-ota]
extends = env:m5stack-core2
upload_protocol = espota
; Example: 192.168.1.42
upload_port = 192.168.4.151
monitor_port = socket://192.168.4.151:23
extra_scripts =
	pre:filter_m5gfx.py
	post:ota_upload_flags.py
